user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.html index.htm;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Cloud-init meta-data endpoint
        location /meta-data {
            add_header Content-Type text/plain;
            try_files $uri /configs/autoinstall/meta-data;
        }
        
        # Cloud-init user-data endpoint with hardware detection
        location /user-data {
            add_header Content-Type text/plain;
            # Try hardware-specific user-data first, then fall back to default
            try_files /configs/autoinstall/$arg_hw-user-data /configs/autoinstall/user-data;
        }
        
        # Serve configuration files
        location /configs/ {
            alias /app/configs/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
        
        # Default location
        location / {
            try_files $uri $uri/ =404;
        }
        
        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
    }
}