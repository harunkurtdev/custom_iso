
set timeout=5
set default 0

loadfont unicode

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray


menuentry "HTTP with User Automatic Setup - HTTP" {
    set gfxpayload=keep
    linux   /casper/vmlinuz quiet autoinstall "ds=nocloud-net;s=http://172.20.0.2:3003/"  ---
    initrd  /casper/initrd 
}

menuentry "File with User Automatic Setup" {
	set gfxpayload=keep
	## linux   /casper/vmlinuz autoinstall "ds=nocloud-net;s=file:///cdrom/" quiet  --- console=ttyS0,115200n8
	linux	/casper/vmlinuz autoinstall "ds=nocloud-net;s=file:///cdrom/pressed/" quiet --- console=ttyS0,115200n8
	initrd	/casper/initrd
}
